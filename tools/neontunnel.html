<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonTunnel — GPU Benchmark | Tools</title>
  <meta name="description" content="WebGL volumetric neon tunnel with ray marching. Fly through and test your device performance.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="../assets/tools/css/neontunnel.css">
  
  <!-- Favicon -->
  <link rel="icon" href="https://avcodewizard.github.io/assets/img/favicon.ico" type="image/x-icon">
  
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p class="loading-text">Loading NeonTunnel...</p>
  </div>
  
  <!-- Error Overlay -->
  <div class="error-overlay" id="errorOverlay">
    <div class="error-icon">⚠️</div>
    <h2 class="error-title" id="errorTitle">Error</h2>
    <p class="error-message" id="errorMessage">Something went wrong.</p>
    <a href="index.html" class="btn btn-primary" style="margin-top: 24px;">Back to Tools</a>
  </div>
  
  <!-- Header -->
  <header class="header">
    <a href="index.html" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back
    </a>
    <div class="logo">NEONTUNNEL</div>
    <div></div> <!-- Spacer -->
  </header>
  
  <!-- Stats Panel -->
  <div class="stats-panel">
    <div class="stat-item">
      <span class="stat-label">FPS</span>
      <span class="stat-value fps-high" id="fpsValue">0 FPS</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Frame Time</span>
      <span class="stat-value" id="frameTimeValue">0 ms</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Resolution</span>
      <span class="stat-value" id="resolutionValue" style="font-size: 0.8rem;">-</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Rating</span>
      <span class="stat-value" id="ratingValue">-</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">RAM Used</span>
      <span class="stat-value" id="ramValue">0 MB</span>
    </div>
    
    <div class="perf-bar">
      <div class="perf-label">GPU Load</div>
      <div class="perf-indicator">
        <div class="perf-fill high" id="perfFill" style="width: 0%"></div>
      </div>
    </div>
  </div>
  
  <!-- WebGL Canvas -->
  <div id="canvas-container">
    <canvas id="glCanvas"></canvas>
  </div>
  
  <!-- Controls Panel -->
  <div class="controls-panel">
    <div class="main-controls">
      <button class="btn btn-primary" id="toggleBenchmark">Stop</button>
      
      <div class="quality-toggle">
        <button class="quality-btn" data-quality="low">Low</button>
        <button class="quality-btn" data-quality="medium">Med</button>
        <button class="quality-btn active" data-quality="high">High</button>
        <button class="quality-btn" data-quality="ultra">Ultra</button>
      </div>
      
      <button class="btn btn-secondary" id="autoDetect">Auto-Detect</button>
    </div>
    
    <div class="stress-toggle" id="stressToggle">
      <span>Stress Mode</span>
      <div class="toggle-switch"></div>
    </div>
  </div>
  
  <!-- NeonTunnel Script -->
  <script src="../assets/tools/js/neontunnel.js"></script>
  
</body>
</html>
