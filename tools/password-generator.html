        <nav class="nav">
          <a href="/">Portfolio</a>
          <a href="/tools/" class="active">Tools</a>
          <!-- <a href="/chat/">Chat</a> -->

        <a href="/tools/" class="back-btn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <h1 class="hero-title">Password <span class="grad">Generator</span></h1>
      <p class="hero-subtitle">
        Create strong, random passwords and passphrases instantly — entirely in your browser. Zero data sent anywhere.
      </p>
    </div>
  </section>

  <!-- Main Content -->
  <section class="tabs-wrapper">
    <div class="container">

      <!-- Tab Nav -->
      <div class="tabs-nav">
        <button class="tab-btn active" data-tab="tab-standard">Standard</button>
        <button class="tab-btn" data-tab="tab-passphrase">Passphrase</button>
        <button class="tab-btn" data-tab="tab-batch">Batch</button>
      </div>

      <!-- ── Standard Tab ─────────────────────────────── -->
      <div class="tab-panel active" id="tab-standard">
        <div class="card">

          <!-- Output -->
          <div class="pwd-display-wrap">
            <div class="pwd-display" id="stdOutputWrap">
              <span id="stdOutput" class="pwd-text"></span>
              <div class="inline-actions">
                <button class="copy-inline" id="stdCopyBtn" title="Copy password">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </button>
                <button class="copy-inline regen-inline" id="stdGenBtn" title="Regenerate password">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Strength -->
          <div class="strength-wrap">
            <div class="strength-label">
              <span>Password Strength</span>
              <span class="strength-text" id="stdStrText">—</span>
            </div>
            <div class="strength-bar-track">
              <div class="strength-bar" id="stdStrBar"></div>
            </div>
          </div>

          <!-- Length Slider -->
          <div class="control-group">
            <div class="control-label">
              <span>Length</span>
              <span class="value" id="stdLengthVal">12</span>
            </div>
            <div class="slider-row">
              <button class="stepper-btn" id="stdLenDec" title="Decrease">−</button>
              <input type="range" class="slider" id="stdLength" min="5" max="128" value="12" step="1">
              <button class="stepper-btn" id="stdLenInc" title="Increase">+</button>
            </div>
          </div>

          <!-- Character Set Toggles -->
          <div class="control-group">
            <div class="control-label"><span>Character Types</span></div>
            <div class="toggles-grid">

              <label class="toggle-item active" id="togUpper">
                <input type="checkbox" checked>
                <span class="toggle-name">Uppercase (A–Z)</span>
                <span class="toggle-switch"></span>
              </label>

              <label class="toggle-item active" id="togLower">
                <input type="checkbox" checked>
                <span class="toggle-name">Lowercase (a–z)</span>
                <span class="toggle-switch"></span>
              </label>

              <label class="toggle-item active" id="togNumbers">
                <input type="checkbox" checked>
                <span class="toggle-name">Numbers (0–9)</span>
                <span class="toggle-switch"></span>
              </label>

              <label class="toggle-item" id="togSymbols">
                <input type="checkbox">
                <span class="toggle-name">Symbols (!@#…)</span>
                <span class="toggle-switch"></span>
              </label>

            </div>
          </div>

          <!-- Generate Button -->
          <div class="btn-row">
            <button class="btn btn-primary" id="stdGenBtnBottom">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              Regenerate
            </button>
          </div>

        </div>
      </div>

      <!-- ── Passphrase Tab ────────────────────────────── -->
      <div class="tab-panel" id="tab-passphrase">
        <div class="card">

          <!-- Output -->
          <div class="pwd-display-wrap">
            <div class="pwd-display phrase-display" id="phraseOutputWrap">
              <span id="phraseOutput" class="pwd-text"></span>
              <button class="copy-inline" id="phraseCopyBtn" title="Copy passphrase">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
              </button>
            </div>
          </div>

          <!-- Options -->
          <div class="form-row">
            <div class="form-group">
              <label for="phraseCount">Word Count</label>
              <select class="form-select" id="phraseCount">
                <option value="3">3 words</option>
                <option value="4" selected>4 words</option>
                <option value="5">5 words</option>
                <option value="6">6 words</option>
                <option value="7">7 words</option>
                <option value="8">8 words</option>
              </select>
            </div>

            <div class="form-group">
              <label for="phraseSep">Separator</label>
              <select class="form-select" id="phraseSep">
                <option value="-" selected>Hyphen  ( - )</option>
                <option value="_">Underscore  ( _ )</option>
                <option value=".">Dot  ( . )</option>
                <option value=" ">Space</option>
                <option value="">None</option>
                <option value="custom">Custom…</option>
              </select>
            </div>
          </div>

          <!-- Custom separator (hidden by default) -->
          <div class="form-row" id="customSepRow" style="display:none;">
            <div class="form-group">
              <label for="phraseSepCustom">Custom Separator</label>
              <input type="text" class="form-input" id="phraseSepCustom" maxlength="5" placeholder="e.g.  #">
            </div>
          </div>

          <!-- Checkboxes -->
          <div class="checkbox-row">
            <label class="checkbox-item">
              <input type="checkbox" id="phraseCapitalize" checked>
              Capitalize first letter
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="phraseNumber">
              Append random number
            </label>
          </div>

          <!-- Generate Button -->
          <div class="btn-row">
            <button class="btn btn-primary" id="phraseGenBtn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              Regenerate
            </button>
          </div>

        </div>
      </div>

      <!-- ── Batch Tab ─────────────────────────────────── -->
      <div class="tab-panel" id="tab-batch">
        <div class="card">

          <!-- Batch Controls -->
          <div class="form-row" style="margin-bottom:20px;">
            <div class="form-group">
              <label for="batchCount">Number of Passwords</label>
              <select class="form-select" id="batchCount">
                <option value="5" selected>5</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
              </select>
            </div>

            <div class="form-group">
              <label>Length: <span id="batchLengthVal" style="color:var(--accent);font-family:'Fira Code',monospace;">12</span></label>
              <input type="range" class="slider" id="batchLength" min="5" max="128" value="12" step="1">
            </div>
          </div>

          <!-- Character set checkboxes -->
          <div class="checkbox-row" style="margin-bottom:24px;">
            <label class="checkbox-item">
              <input type="checkbox" id="batchUpper" checked>
              Uppercase
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="batchLower" checked>
              Lowercase
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="batchNumbers" checked>
              Numbers
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="batchSymbols">
              Symbols
            </label>
          </div>

          <!-- Copy All -->
          <div class="copy-all-row">
            <button class="btn btn-secondary" id="batchCopyAll" style="flex:none;padding:10px 20px;font-size:0.88rem;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              Copy All
            </button>
          </div>

          <!-- Password List -->
          <div class="batch-list" id="batchList"></div>

          <!-- Generate Button -->
          <div class="btn-row">
            <button class="btn btn-primary" id="batchGenBtn">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              Regenerate All
            </button>
          </div>

        </div>
      </div>

    </div>
  </section>
